nerdfont: true
base_branch: origin/main
merge_strategy: rebase
agents:
  claude: "claude --dangerously-skip-permissions"
agent: claude
theme: obsidian-pop

auto_name:
  background: true

sidebar:
  width: 35
  layout: tiles

files:
  symlink:
    - .claude/settings.local.json

post_create:
  - git fetch origin main --quiet 2>/dev/null || true

panes:
  - command: <agent>
    focus: true
  - split: horizontal
    size: 15
